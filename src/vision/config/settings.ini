[camera]
index = 6
width = 640
height = 480
fps = 15
flip_vertical = false

[detection]
roi_top_ratio = 0.00
roi_bottom_ratio = 1.00
roi_left_ratio = 0.00
roi_right_ratio = 1.00
n_bands = 3

[curve]
min_points_for_poly = 3

[yolo]
model = ../models/best.pt
conf = 0.2
line_conf = 0.45
# 라인 판단과 별개로 화면에는 이 값보다 큰 라인만 표시한다.
line_display_conf = 0.40
ball_conf = 0.35
hurdle_conf = 0.2
imgsz = 640
device = 0
line_class = line
ball_class = ball
hurdle_class = hurdle

[visibility]
# If 30% or more of the object is cut/hidden, require at least 70% visible.
min_visible_ratio = 0.70
# YOLO boxes are usually clipped to the frame, so this rejects selected objects touching image borders.
reject_edge_cut_objects = false
edge_margin = 3
# 공과 허들 모두 화면 경계에 닿아도 검출 결과를 유지한다.
partial_filter_classes =

[output]
show_window = true
save_video =
print_every_n_frames = 5
publish_hurdle_result = false
