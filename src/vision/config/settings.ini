[camera]
index = 6
width = 640
height = 480
fps = 30
flip_vertical = false

[detection]
roi_top_ratio = 0.00
roi_bottom_ratio = 1.00
roi_left_ratio = 0.00
roi_right_ratio = 1.00
n_bands = 3

[curve]
min_points_for_poly = 3

[yolo]
model = ../models/best.engine
conf = 0.35
line_conf = 0.35
ball_conf = 0.35
hurdle_conf = 0.35
imgsz = 640
device = 0
line_class = line
ball_class = ball
hurdle_class = hurdle

[visibility]
# If 30% or more of the object is cut/hidden, require at least 70% visible.
min_visible_ratio = 0.70
# YOLO boxes are usually clipped to the frame, so this rejects selected objects touching image borders.
reject_edge_cut_objects = true
edge_margin = 3
# Keep line out of this list by default; line markers near the bottom are often partially visible.
partial_filter_classes = ball,hurdle

[output]
show_window = true
save_video =
print_every_n_frames = 5
publish_hurdle_result = false
